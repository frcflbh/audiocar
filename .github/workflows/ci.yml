name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audiocar_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Dependências
        run: flutter pub get

      - name: Análise estática
        run: flutter analyze

      - name: Testes
        run: flutter test
